services:
  - type: web
    name: viewcore
    runtime: node
    region: singapore
    plan: free
    buildCommand: pnpm install && pnpm build:web && pnpm build:server
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: MANUS_PUSH_API_KEY
        sync: false
